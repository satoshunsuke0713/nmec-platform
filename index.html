<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-MEC 会員プラットフォーム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f5f5f5; color: #1a1a1a; }
:root { --red: #CC0000; --red-dark: #990000; --red-light: #fff0f0; --white: #ffffff; --gray: #f5f5f5; --gray-mid: #e0e0e0; --gray-dark: #333333; --text: #1a1a1a; --text-mid: #666666; }
#auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: #1a1a1a; }
.auth-box { background: var(--white); border-radius: 4px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
.auth-logo { display: flex; align-items: center; gap: 20px; margin-bottom: 36px; padding-bottom: 28px; border-bottom: 2px solid var(--red); }
.logo-mark { width: 72px; height: 88px; background: var(--red); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; padding: 8px; }
.logo-n { font-size: 38px; font-weight: 900; color: var(--white); line-height: 1; }
.logo-mec { font-size: 18px; font-weight: 900; color: var(--white); line-height: 1; letter-spacing: 2px; }
.auth-logo-text h1 { font-size: 15px; font-weight: 800; color: var(--gray-dark); line-height: 1.4; }
.auth-logo-text p { font-size: 11px; color: var(--text-mid); margin-top: 4px; line-height: 1.5; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--gray-dark); margin-bottom: 8px; }
.form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--gray-mid); border-radius: 2px; font-size: 16px; outline: none; background: #fafafa; }
.form-group input:focus { border-color: var(--red); background: var(--white); }
.btn-primary { width: 100%; padding: 16px; background: var(--red); color: var(--white); border: none; border-radius: 2px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
.btn-primary:hover { background: var(--red-dark); }
.auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-mid); }
.auth-switch a { color: var(--red); cursor: pointer; font-weight: 700; }
.error-msg { background: var(--red-light); color: var(--red); padding: 12px 16px; border-left: 4px solid var(--red); border-radius: 2px; font-size: 14px; margin-bottom: 20px; }
#app-screen { display: none; }
.header { height: 64px; background: var(--red); display: flex; align-items: center; padding: 0 20px; gap: 16px; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.header-menu { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--white); padding: 4px; }
.header-logo { display: flex; align-items: center; gap: 10px; flex: 1; }
.header-logo-mark { width: 36px; height: 44px; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.header-logo-n { font-size: 20px; font-weight: 900; color: var(--red); line-height: 1; }
.header-logo-mec { font-size: 9px; font-weight: 900; color: var(--red); line-height: 1; letter-spacing: 1px; }
.header-title { font-size: 16px; font-weight: 700; color: var(--white); letter-spacing: 1px; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
.sidebar { width: 280px; background: #1a1a1a; height: 100vh; display: flex; flex-direction: column; position: fixed; left: -280px; top: 0; z-index: 100; transition: left 0.3s; }
.sidebar.open { left: 0; }
.sidebar-header { padding: 0 24px; background: var(--red); display: flex; align-items: center; gap: 16px; height: 100px; }
.sidebar-logo-mark { width: 52px; height: 64px; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
.sidebar-logo-n { font-size: 28px; font-weight: 900; color: var(--red); line-height: 1; }
.sidebar-logo-mec { font-size: 13px; font-weight: 900; color: var(--red); line-height: 1; letter-spacing: 2px; }
.sidebar-header-text h2 { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.5; }
.sidebar-header-text p { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
.nav-item { padding: 14px 24px; cursor: pointer; display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.6); font-size: 15px; border-left: 3px solid transparent; transition: all 0.15s; }
.nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
.nav-item.active { background: rgba(204,0,0,0.2); border-left-color: var(--red); color: var(--white); font-weight: 700; }
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar-user { padding: 20px 24px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
.sidebar-user-role { font-size: 11px; color: var(--red); letter-spacing: 1px; font-weight: 700; margin-bottom: 4px; }
.sidebar-user-name { font-size: 16px; font-weight: 700; color: var(--white); }
.sidebar-user-company { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }
.logout-btn { margin-top: 14px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15); border-radius: 2px; padding: 8px 16px; font-size: 13px; cursor: pointer; width: 100%; }
.main { padding: 20px 16px; max-width: 720px; margin: 0 auto; }
.bottom-nav { background: var(--white); border-top: 2px solid var(--red); display: flex; justify-content: space-around; padding: 8px 0; position: sticky; bottom: 0; z-index: 40; }
.bottom-nav button { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 6px 8px; color: var(--text-mid); font-size: 10px; font-weight: 600; }
.bottom-nav button.active { color: var(--red); }
.card { background: var(--white); border-radius: 4px; padding: 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 16px; border-top: 3px solid transparent; }
.card-accent { border-top-color: var(--red); }
.section-title { font-size: 11px; font-weight: 800; color: var(--text-mid); margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--gray-mid); }
.badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 2px; font-weight: 700; white-space: nowrap; }
.badge-red { background: var(--red); color: var(--white); }
.badge-gray { background: var(--gray-mid); color: var(--text-mid); }
.badge-green { background: #1a7a4a; color: var(--white); }
.badge-orange { background: #f59e0b; color: #fff; }
.badge-blue { background: #1a3a6a; color: var(--white); }
.welcome-card { background: var(--red); border-radius: 4px; padding: 28px 24px; color: var(--white); margin-bottom: 16px; position: relative; overflow: hidden; }
.welcome-card::before { content: 'N'; position: absolute; right: -10px; top: -20px; font-size: 140px; font-weight: 900; color: rgba(255,255,255,0.08); line-height: 1; pointer-events: none; }
.welcome-card small { font-size: 12px; opacity: 0.7; letter-spacing: 1px; }
.welcome-card h2 { font-size: 22px; font-weight: 800; margin-top: 6px; }
.welcome-card p { font-size: 13px; opacity: 0.75; margin-top: 6px; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--gray); }
.row:last-child { border-bottom: none; }
.row-title { font-weight: 700; font-size: 15px; color: var(--text); }
.row-sub { font-size: 13px; color: var(--text-mid); margin-top: 4px; }
.back-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 15px; margin-bottom: 16px; padding: 0; font-weight: 700; display: block; }
.nav-btns { display: flex; gap: 8px; margin-bottom: 16px; justify-content: space-between; }
.nav-btn { padding: 8px 16px; background: none; border: 1.5px solid var(--gray-mid); border-radius: 4px; font-size: 15px; font-weight: 700; cursor: pointer; color: var(--text-mid); }
.detail-title { font-size: 20px; font-weight: 800; color: var(--gray-dark); margin: 12px 0 20px; line-height: 1.4; }
.detail-row { padding: 12px 0; border-bottom: 1px solid var(--gray); display: flex; gap: 16px; }
.detail-label { font-size: 12px; color: var(--text-mid); width: 80px; flex-shrink: 0; font-weight: 700; padding-top: 2px; }
.detail-value { font-size: 15px; color: var(--text); }
.rsvp-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
.rsvp-btn { padding: 14px 20px; border: 2px solid var(--gray-mid); border-radius: 4px; background: var(--white); cursor: pointer; font-size: 15px; font-weight: 700; color: var(--text); }
.rsvp-btn.selected-attend { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }
.rsvp-btn.selected-absent { background: var(--red-light); border-color: var(--red); color: var(--red); }
.rsvp-btn.selected-late { background: #fff8e1; border-color: #f59e0b; color: #92400e; }
.search-input { width: 100%; padding: 14px 18px; border: 1.5px solid var(--gray-mid); border-radius: 4px; font-size: 16px; outline: none; margin-bottom: 16px; background: var(--white); }
.filter-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 8px 14px; border-radius: 2px; border: 1.5px solid var(--gray-mid); cursor: pointer; font-size: 13px; font-weight: 700; background: var(--white); color: var(--text-mid); }
.filter-btn.active { background: var(--red); color: var(--white); border-color: var(--red); }
.avatar { width: 48px; height: 48px; border-radius: 2px; background: var(--red); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 20px; font-weight: 800; flex-shrink: 0; }
.avatar-lg { width: 72px; height: 72px; font-size: 28px; }
.member-row { display: flex; gap: 16px; align-items: center; }
.member-info { flex: 1; }
.member-name { font-weight: 800; font-size: 16px; color: var(--text); }
.member-sub { font-size: 13px; color: var(--text-mid); margin-top: 4px; }
.committee-tag { display: inline-flex; align-items: center; gap: 4px; background: #f0f4ff; border: 1px solid #c0ccee; border-radius: 2px; padding: 3px 8px; font-size: 11px; font-weight: 700; color: #1a3a6a; margin-top: 6px; }
.doc-row { display: flex; gap: 14px; align-items: center; }
.doc-info { flex: 1; }
.doc-name { font-weight: 700; font-size: 15px; color: var(--text); }
.doc-meta { font-size: 13px; color: var(--text-mid); margin-top: 4px; }
.dl-btn { padding: 8px 16px; background: var(--red); color: var(--white); border: none; border-radius: 2px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
.form-group-inline { margin-bottom: 18px; }
.form-group-inline label { display: block; font-size: 13px; font-weight: 700; color: var(--gray-dark); margin-bottom: 8px; }
.form-group-inline input, .form-group-inline select, .form-group-inline textarea { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-mid); border-radius: 2px; font-size: 15px; outline: none; background: #fafafa; }
.form-group-inline textarea { resize: vertical; min-height: 100px; }
.submit-btn { width: 100%; padding: 16px; background: var(--red); color: var(--white); border: none; border-radius: 2px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 8px; letter-spacing: 1px; }
.submit-btn:hover { background: var(--red-dark); }
.submit-btn-outline { width: 100%; padding: 14px; background: var(--white); color: var(--red); border: 2px solid var(--red); border-radius: 2px; font-size: 15px; font-weight: 800; cursor: pointer; margin-bottom: 12px; }
.loading { text-align: center; padding: 60px 20px; color: var(--text-mid); font-size: 15px; }
.loading::before { content: ''; display: block; width: 40px; height: 40px; border: 3px solid var(--gray-mid); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-mark"><div class="logo-n">N</div><div class="logo-mec">MEC</div></div>
      <div class="auth-logo-text"><h1>新潟市異業種交流<br>研究会協同組合</h1><p>Niigata City Multi-Enterprise<br>Exchange Cooperative Union</p></div>
    </div>
    <div id="auth-error" class="error-msg" style="display:none"></div>
    <div id="login-form">
      <div class="form-group"><label>メールアドレス</label><input type="email" id="login-email" placeholder="example@email.com" autocomplete="email"></div>
      <div class="form-group"><label>パスワード</label><input type="password" id="login-password" placeholder="パスワードを入力" autocomplete="current-password"></div>
      <button class="btn-primary" onclick="login()">ログイン</button>
      <div class="auth-switch">アカウントがない方は <a onclick="toggleForm('signup')">新規登録</a></div>
    </div>
    <div id="signup-form" style="display:none">
      <div class="form-group"><label>お名前</label><input type="text" id="signup-name" placeholder="山田 太郎"></div>
      <div class="form-group"><label>会社名</label><input type="text" id="signup-company" placeholder="株式会社〇〇"></div>
      <div class="form-group"><label>メールアドレス</label><input type="email" id="signup-email" placeholder="example@email.com"></div>
      <div class="form-group"><label>パスワード</label><input type="password" id="signup-password" placeholder="8文字以上"></div>
      <button class="btn-primary" onclick="signup()">新規登録</button>
      <div class="auth-switch">すでにアカウントをお持ちの方は <a onclick="toggleForm('login')">ログイン</a></div>
    </div>
  </div>
</div>
<div id="app-screen">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-mark"><div class="sidebar-logo-n">N</div><div class="sidebar-logo-mec">MEC</div></div>
      <div class="sidebar-header-text"><h2>新潟市異業種交流<br>研究会協同組合</h2><p>会員専用プラットフォーム</p></div>
    </div>
    <div style="padding:12px 0;flex:1;overflow-y:auto">
      <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')"><span class="nav-icon">🏠</span>ダッシュボード</div>
      <div class="nav-item" id="nav-events" onclick="navigate('events')"><span class="nav-icon">📅</span>会議・事業</div>
      <div class="nav-item" id="nav-motions" onclick="navigate('motions')"><span class="nav-icon">📁</span>資料</div>
      <div class="nav-item" id="nav-members" onclick="navigate('members')"><span class="nav-icon">👥</span>理事メンバー</div>
      <div class="nav-item" id="nav-committees" onclick="navigate('committees')" style="display:none"><span class="nav-icon">🏛️</span>委員会管理</div>
      <div class="nav-item" id="nav-notices" onclick="navigate('notices')"><span class="nav-icon">🔔</span>お知らせ</div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-role" id="sb-role">—</div>
      <div class="sidebar-user-name" id="sb-name">—</div>
      <div class="sidebar-user-company" id="sb-company">—</div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>
  <div class="header">
    <button class="header-menu" onclick="toggleSidebar()">☰</button>
    <div class="header-logo">
      <div class="header-logo-mark"><div class="header-logo-n">N</div><div class="header-logo-mec">MEC</div></div>
      <div class="header-title" id="header-title">ダッシュボード</div>
    </div>
  </div>
  <div class="main" id="main-content"></div>
  <div class="bottom-nav">
    <button onclick="navigate('dashboard')" id="bn-dashboard" class="active"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>ホーム</button>
    <button onclick="navigate('events')" id="bn-events"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>会議・事業</button>
    <button onclick="navigate('motions')" id="bn-motions"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>資料</button>
    <button onclick="navigate('members')" id="bn-members"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>理事</button>
    <button onclick="navigate('notices')" id="bn-notices"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>お知らせ</button>
  </div>
</div>
<script>
const SUPABASE_URL='https://cadindivyghcjlbetsoi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhZGluZGl2eWdoY2psYmV0c29pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTgzMDQsImV4cCI6MjA5MDM5NDMwNH0.teIhuA9o6NsuLE_QmYsIYmISf0dxG0FsCBQHPkixm2c';
const API=SUPABASE_URL+'/rest/v1';
const AUTH=SUPABASE_URL+'/auth/v1';
let currentUser=null,currentProfile=null,accessToken=null;
const hdrs=()=>({'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+(accessToken||SUPABASE_KEY)});
function checkRsvpUrl(){const p=new URLSearchParams(window.location.search);const r=p.get('rsvp');if(r)window._pendingRsvp=r;}
function toggleForm(t){document.getElementById('login-form').style.display=t==='login'?'block':'none';document.getElementById('signup-form').style.display=t==='signup'?'block':'none';document.getElementById('auth-error').style.display='none';}
async function login(){const email=document.getElementById('login-email').value,pw=document.getElementById('login-password').value;try{const res=await axios.post(AUTH+'/token?grant_type=password',{email,password:pw},{headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY}});accessToken=res.data.access_token;currentUser=res.data.user;await loadProfile();showApp();}catch(e){showError('メールアドレスまたはパスワードが正しくありません');}}
async function signup(){const name=document.getElementById('signup-name').value,company=document.getElementById('signup-company').value,email=document.getElementById('signup-email').value,pw=document.getElementById('signup-password').value;if(!name||!email||!pw){showError('必須項目を入力してください');return;}try{const res=await axios.post(AUTH+'/signup',{email,password:pw},{headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY}});accessToken=res.data.access_token;currentUser=res.data.user;await axios.patch(API+'/users?id=eq.'+currentUser.id,{name,company},{headers:Object.assign({},hdrs(),{'Prefer':'return=minimal'})});await loadProfile();showApp();}catch(e){showError('登録に失敗しました。メールアドレスをご確認ください。');}}
async function logout(){try{await axios.post(AUTH+'/logout',{},{headers:hdrs()});}catch(e){}accessToken=null;currentUser=null;currentProfile=null;document.getElementById('app-screen').style.display='none';document.getElementById('auth-screen').style.display='flex';}
async function loadProfile(){try{const res=await axios.get(API+'/users?id=eq.'+currentUser.id,{headers:hdrs()});currentProfile=res.data[0]||{name:currentUser.email,role:'member',company:''};}catch(e){currentProfile={name:currentUser.email,role:'member',company:''};}}
function showError(msg){const el=document.getElementById('auth-error');el.textContent=msg;el.style.display='block';}
function showApp(){document.getElementById('auth-screen').style.display='none';document.getElementById('app-screen').style.display='block';document.getElementById('sb-name').textContent=currentProfile.name||'—';document.getElementById('sb-company').textContent=currentProfile.company||'—';document.getElementById('sb-role').textContent=roleLabel(currentProfile.role);const canManage=['admin','office','director'].includes(currentProfile.role);document.getElementById('nav-committees').style.display=canManage?'flex':'none';if(window._pendingRsvp){const r=window._pendingRsvp;window._pendingRsvp=null;navigate('events');showEventDetail(r);}else navigate('dashboard');}
function roleLabel(r){return{admin:'管理者',office:'事務局',director:'理事・委員長',member:'一般会員'}[r]||r;}
function typeLabel(t){return{sanyaku:'三役会議',rijikai:'理事会',reikai:'例会',iinkai:'委員会',jigyou:'その他事業',other:'その他'}[t]||t;}
function statusLabel(s){return s==='attend'?'出席':s==='absent'?'欠席':s==='late'?'遅刻・早退':'—';}
function statusBadge(s){return s==='attend'?'badge-green':s==='absent'?'badge-red':s==='late'?'badge-orange':'badge-gray';}
function fmtDate(d){const dt=new Date(d);return dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'+dt.getDate()+'日 '+dt.getHours()+':'+String(dt.getMinutes()).padStart(2,'0');}
function fmtDateShort(d){const dt=new Date(d);return dt.getFullYear()+'/'+(dt.getMonth()+1)+'/'+dt.getDate();}
function navigate(page){closeSidebar();const titles={dashboard:'ダッシュボード',events:'会議・事業',motions:'資料',members:'理事メンバー',notices:'お知らせ',committees:'委員会管理'};document.getElementById('header-title').textContent=titles[page]||'';	document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active');});document.querySelectorAll('.bottom-nav button').forEach(function(el){el.classList.remove('active');});const ni=document.getElementById('nav-'+page),bi=document.getElementById('bn-'+page);if(ni)ni.classList.add('active');if(bi)bi.classList.add('active');const pages={dashboard:renderDashboard,events:renderEvents,motions:renderMotions,members:renderMembers,notices:renderNotices,committees:renderCommittees};if(pages[page])pages[page]();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').style.display=document.getElementById('sidebar').classList.contains('open')?'block':'none';}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').style.display='none';}
async function autoCloseEvents(){try{await axios.patch(API+'/events?status=eq.published&date=lt.'+new Date().toISOString(),{status:'done'},{headers:Object.assign({},hdrs(),{'Prefer':'return=minimal'})});}catch(e){}}
async function renderDashboard(){await autoCloseEvents();const el=document.getElementById('main-content');el.innerHTML='<div class="loading"></div>';try{const[evRes,notRes]=await Promise.all([axios.get(API+'/events?status=eq.published&order=date.asc&limit=3',{headers:hdrs()}),axios.get(API+'/notices?order=created_at.desc&limit=3',{headers:hdrs()})]);let html='<div class="welcome-card"><small>WELCOME</small><h2>'+(currentProfile.name||'')+' 様</h2><p>'+(currentProfile.company||'')+'　|　'+roleLabel(currentProfile.role)+'</p></div>';if(evRes.data.length>0){html+='<div class="card card-accent"><div class="section-title">📅 次回の予定</div>';evRes.data.forEach(function(e){html+='<div class="row" onclick="showEventDetail(\''+e.id+'\')" style="cursor:pointer"><div><div class="row-title">'+e.title+'</div><div class="row-sub">🕐 '+fmtDate(e.date)+'　📍'+(e.location||'')+'</div></div><span class="badge badge-red">'+typeLabel(e.type)+'</span></div>';});html+='</div>';}if(notRes.data.length>0){html+='<div class="card"><div class="section-title">🔔 新着お知らせ</div>';notRes.data.forEach(function(n){html+='<div class="row" onclick="showNoticeDetail(\''+n.id+'\')" style="cursor:pointer"><div>'+(n.priority==='important'?'<span class="badge badge-red" style="margin-bottom:6px;display:inline-block">重要</span><br>':'')+'<div class="row-title">'+n.title+'</div><div class="row-sub">'+fmtDateShort(n.created_at)+'</div></div></div>';});html+='</div>';}if(evRes.data.length===0&&notRes.data.length===0)html+='<div class="empty">データがまだありません</div>';el.innerHTML=html;}catch(e){el.innerHTML='<div class="empty">読み込みに失敗しました</div>';}}
async function renderEvents(){await autoCloseEvents();const el=document.getElementById('main-content');el.innerHTML='<div class="loading"></div>';try{const res=await axios.get(API+'/events?order=date.asc',{headers:hdrs()});const canCreate=['admin','office','director'].includes(currentProfile.role);let html='<div class="filter-btns"><button class="filter-btn active" onclick="filterEvents(\'all\',this)">すべて</button><button class="filter-btn" onclick="filterEvents(\'sanyaku\',this)">三役会議</button><button class="filter-btn" onclick="filterEvents(\'rijikai\',this)">理事会</button><button class="filter-btn" onclick="filterEvents(\'reikai\',this)">例会</button><button class="filter-btn" onclick="filterEvents(\'iinkai\',this)">委員会</button><button class="filter-btn" onclick="filterEvents(\'jigyou\',this)">その他事業</button></div>';if(canCreate)html+='<button class="submit-btn-outline" onclick="showEventForm()">＋ イベントを作成</button>';html+='<div id="events-list">';if(res.data.length===0)html+='<div class="empty">予定がまだありません</div>';res.data.forEach(function(e){html+=eventCard(e);});html+='</div>';el.innerHTML=html;}catch(e){el.innerHTML='<div class="empty">読み込みに失敗しました</div>';}}
function eventCard(e){const sb=e.status==='done'?'<span class="badge badge-gray">終了</span>':'<span class="badge badge-green">開催予定</span>';const canEdit=['admin','office','director'].includes(currentProfile?currentProfile.role:'');return'<div class="card" data-type="'+e.type+'"><div style="display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px"><div style="display:flex;gap:6px"><span class="badge badge-red">'+typeLabel(e.type)+'</span>'+sb+'</div>'+(canEdit?'<div style="display:flex;gap:6px"><button onclick="showEventEditForm(\''+e.id+'\')" style="background:none;border:1px solid var(--gray-mid);border-radius:2px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text-mid)">編集</button><button onclick="deleteEvent(\''+e.id+'\')" style="background:none;border:1px solid #ccc;border-radius:2px;padding:4px 10px;font-size:12px;cursor:pointer;color:#999">削除</button></div>':'')+'</div><div class="row-title" style="font-size:17px;margin-bottom:8px;cursor:pointer" onclick="showEventDetail(\''+e.id+'\')"> '+e.title+'</div><div class="row-sub" style="cursor:pointer" onclick="showEventDetail(\''+e.id+'\')">🕐 '+fmtDate(e.date)+'　📍'+(e.location||'場所未定')+'</div>'+(e.committee?'<div class="row-sub" style="margin-top:4px">🏛️ '+e.committee+'</div>':'')+'</div>';}
function filterEvents(type,btn){document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');document.querySelectorAll('#events-list .card').forEach(function(c){c.style.display=(type==='all'||c.dataset.type===type)?'block':'none';});}
async function deleteEvent(id){if(!confirm('この会議・事業を削除しますか？'))return;try{await axios.delete(API+'/events?id=eq.'+id,{headers:hdrs()});navigate('events');}catch(e){alert('削除に失敗しました');}}
function showEventForm(){const el=document.getElementById('main-content');axios.get(API+'/committees?order=sort_order.asc',{headers:hdrs()}).then(function(res){const opts=res.data.map(function(c){return'<option value="'+c.name+'">'+c.name+'</option>';}).join('');el.innerHTML='<button class="back-btn" onclick="navigate(\'events\')">← 一覧に戻る</button><div class="card card-accent"><div class="section-title">📅 イベントを作成</div><div class="form-group-inline"><label>タイトル *</label><input type="text" id="ev-title" placeholder="第149回 定例例会"></div><div class="form-group-inline"><label>種別 *</label><select id="ev-type"><option value="sanyaku">三役会議</option><option value="rijikai">理事会</option><option value="reikai">例会</option><option value="iinkai">委員会</option><option value="jigyou">その他事業</option><option value="other">その他</option></select></div><div class="form-group-inline"><label>担当委員会</label><select id="ev-committee"><option value="">なし（全体）</option>'+opts+'</select></div><div class="form-group-inline"><label>日時 *</label><input type="datetime-local" id="ev-date"></div><div class="form-group-inline"><label>場所</label><input type="text" id="ev-location" placeholder="万代シルバーホテル 3F"></div><div class="form-group-inline"><label>概要</label><textarea id="ev-desc" placeholder="内容の説明"></textarea></div><div class="form-group-inline"><label>出欠締切日</label><input type="datetime-local" id="ev-deadline"></div><button class="submit-btn" onclick="submitNewEvent()">作成する</button></div>';});}
async function submitNewEvent(){const title=document.getElementById('ev-title').value,date=document.getElementById('ev-date').value;if(!title||!date){alert('タイトルと日時は必須です');return;}try{const eventDate=new Date(date);const dateStr=eventDate.getFullYear()+'年'+(eventDate.getMonth()+1)+'月'+eventDate.getDate()+'日 '+eventDate.getHours()+':'+String(eventDate.getMinutes()).padStart(2,'0');const type=document.getElementById('ev-type').value,location=document.getElementById('ev-location').value,committee=document.getElementById('ev-committee').value;await axios.post(API+'/events',{title,type,date:eventDate.toISOString(),location,description:document.getElementById('ev-desc').value,committee:committee||null,rsvp_deadline:document.getElementById('ev-deadline').value?new Date(document.getElementById('ev-deadline').value).toISOString():null,status:'published',created_by:currentUser.id},{headers:hdrs()});const nb='【'+typeLabel(type)+'】'+title+' の開催が登録されました。\n\n📅 日時：'+dateStr+'\n'+(location?'📍 場所：'+location+'\n':'')+（committee?'🏛️ 担当委員会：'+committee+'\n':'')+'\n詳細は「会議・事業」メニューよりご確認ください。';await axios.post(API+'/notices',{title:'【'+typeLabel(type)+'】'+title+' が登録されました',body:nb,priority:'normal',created_by:currentUser.id},{headers:hdrs()});alert('作成しました！');navigate('events');}catch(e){alert('作成に失敗しました');}}
