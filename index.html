<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-MEC 会員プラットフォーム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f5f5f5; color: #1a1a1a; }
:root {
  --red: #CC0000; --red-dark: #990000; --red-light: #fff0f0;
  --white: #ffffff; --gray: #f5f5f5; --gray-mid: #e0e0e0;
  --gray-dark: #333333; --text: #1a1a1a; --text-mid: #666666; --gold: #C9A84C;
}
#auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: #1a1a1a; }
.auth-box { background: var(--white); border-radius: 4px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
.auth-logo { display: flex; align-items: center; gap: 20px; margin-bottom: 36px; padding-bottom: 28px; border-bottom: 2px solid var(--red); }
.logo-mark { width: 72px; height: 88px; background: var(--red); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; padding: 8px; }
.logo-n { font-size: 38px; font-weight: 900; color: var(--white); line-height: 1; }
.logo-mec { font-size: 18px; font-weight: 900; color: var(--white); line-height: 1; letter-spacing: 2px; }
.auth-logo-text h1 { font-size: 15px; font-weight: 800; color: var(--gray-dark); line-height: 1.4; }
.auth-logo-text p { font-size: 11px; color: var(--text-mid); margin-top: 4px; line-height: 1.5; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--gray-dark); margin-bottom: 8px; }
.form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--gray-mid); border-radius: 2px; font-size: 16px; outline: none; background: #fafafa; }
.form-group input:focus { border-color: var(--red); background: var(--white); }
.btn-primary { width: 100%; padding: 16px; background: var(--red); color: var(--white); border: none; border-radius: 2px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
.btn-primary:hover { background: var(--red-dark); }
.auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-mid); }
.auth-switch a { color: var(--red); cursor: pointer; font-weight: 700; }
.error-msg { background: var(--red-light); color: var(--red); padding: 12px 16px; border-left: 4px solid var(--red); border-radius: 2px; font-size: 14px; margin-bottom: 20px; }
#app-screen { display: none; }
.header { height: 64px; background: var(--red); display: flex; align-items: center; padding: 0 20px; gap: 16px; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.header-menu { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--white); padding: 4px; }
.header-logo { display: flex; align-items: center; gap: 10px; flex: 1; }
.header-logo-mark { width: 36px; height: 44px; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.header-logo-n { font-size: 20px; font-weight: 900; color: var(--red); line-height: 1; }
.header-logo-mec { font-size: 9px; font-weight: 900; color: var(--red); line-height: 1; letter-spacing: 1px; }
.header-title { font-size: 16px; font-weight: 700; color: var(--white); letter-spacing: 1px; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
.sidebar { width: 280px; background: #1a1a1a; height: 100vh; display: flex; flex-direction: column; position: fixed; left: -280px; top: 0; z-index: 100; transition: left 0.3s; }
.sidebar.open { left: 0; }
.sidebar-header { padding: 0 24px; background: var(--red); display: flex; align-items: center; gap: 16px; height: 100px; }
.sidebar-logo-mark { width: 52px; height: 64px; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
.sidebar-logo-n { font-size: 28px; font-weight: 900; color: var(--red); line-height: 1; }
.sidebar-logo-mec { font-size: 13px; font-weight: 900; color: var(--red); line-height: 1; letter-spacing: 2px; }
.sidebar-header-text h2 { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.5; }
.sidebar-header-text p { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
.nav-item { padding: 14px 24px; cursor: pointer; display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.6); font-size: 15px; border-left: 3px solid transparent; transition: all 0.15s; }
.nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
.nav-item.active { background: rgba(204,0,0,0.2); border-left-color: var(--red); color: var(--white); font-weight: 700; }
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar-user { padding: 20px 24px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
.sidebar-user-role { font-size: 11px; color: var(--red); letter-spacing: 1px; font-weight: 700; margin-bottom: 4px; }
.sidebar-user-name { font-size: 16px; font-weight: 700; color: var(--white); }
.sidebar-user-company { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }
.logout-btn { margin-top: 14px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15); border-radius: 2px; padding: 8px 16px; font-size: 13px; cursor: pointer; width: 100%; }
.main { padding: 20px 16px; max-width: 720px; margin: 0 auto; }
.bottom-nav { background: var(--white); border-top: 2px solid var(--red); display: flex; justify-content: space-around; padding: 8px 0; position: sticky; bottom: 0; z-index: 40; }
.bottom-nav button { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 6px 8px; color: var(--text-mid); font-size: 10px; font-weight: 600; }
.bottom-nav button.active { color: var(--red); }
.bn-icon { font-size: 22px; }
.card { background: var(--white); border-radius: 4px; padding: 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 16px; border-top: 3px solid transparent; }
.card-accent { border-top-color: var(--red); }
.section-title { font-size: 11px; font-weight: 800; color: var(--text-mid); margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--gray-mid); }
.badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 2px; font-weight: 700; white-space: nowrap; letter-spacing: 0.5px; }
.badge-red { background: var(--red); color: var(--white); }
.badge-dark { background: var(--gray-dark); color: var(--white); }
.badge-gray { background: var(--gray-mid); color: var(--text-mid); }
.badge-green { background: #1a7a4a; color: var(--white); }
.welcome-card { background: var(--red); border-radius: 4px; padding: 28px 24px; color: var(--white); margin-bottom: 16px; position: relative; overflow: hidden; }
.welcome-card::before { content: 'N'; position: absolute; right: -10px; top: -20px; font-size: 140px; font-weight: 900; color: rgba(255,255,255,0.08); line-height: 1; pointer-events: none; }
.welcome-card small { font-size: 12px; opacity: 0.7; letter-spacing: 1px; }
.welcome-card h2 { font-size: 22px; font-weight: 800; margin-top: 6px; }
.welcome-card p { font-size: 13px; opacity: 0.75; margin-top: 6px; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--gray); }
.row:last-child { border-bottom: none; }
.row-title { font-weight: 700; font-size: 15px; color: var(--text); }
.row-sub { font-size: 13px; color: var(--text-mid); margin-top: 4px; }
.back-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 15px; margin-bottom: 20px; padding: 0; font-weight: 700; }
.detail-title { font-size: 20px; font-weight: 800; color: var(--gray-dark); margin: 12px 0 20px; line-height: 1.4; }
.detail-row { padding: 12px 0; border-bottom: 1px solid var(--gray); display: flex; gap: 16px; }
.detail-label { font-size: 12px; color: var(--text-mid); width: 80px; flex-shrink: 0; font-weight: 700; padding-top: 2px; }
.detail-value { font-size: 15px; color: var(--text); }
.rsvp-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
.rsvp-btn { padding: 14px 24px; border: 2px solid var(--gray-mid); border-radius: 4px; background: var(--white); cursor: pointer; font-size: 15px; font-weight: 700; color: var(--text); }
.rsvp-btn.selected-attend { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }
.rsvp-btn.selected-absent { background: var(--red-light); border-color: var(--red); color: var(--red); }
.rsvp-btn.selected-pending { background: #fff8e1; border-color: #f59e0b; color: #92400e; }
.search-input { width: 100%; padding: 14px 18px; border: 1.5px solid var(--gray-mid); border-radius: 4px; font-size: 16px; outline: none; margin-bottom: 16px; background: var(--white); }
.search-input:focus { border-color: var(--red); }
.filter-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 8px 14px; border-radius: 2px; border: 1.5px solid var(--gray-mid); cursor: pointer; font-size: 13px; font-weight: 700; background: var(--white); color: var(--text-mid); }
.filter-btn.active { background: var(--red); color: var(--white); border-color: var(--red); }
.avatar { width: 48px; height: 48px; border-radius: 2px; background: var(--red); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 20px; font-weight: 800; flex-shrink: 0; }
.avatar-lg { width: 72px; height: 72px; font-size: 28px; }
.member-row { display: flex; gap: 16px; align-items: center; }
.member-info { flex: 1; }
.member-name { font-weight: 800; font-size: 16px; color: var(--text); }
.member-sub { font-size: 13px; color: var(--text-mid); margin-top: 4px; }
.doc-row { display: flex; gap: 14px; align-items: center; }
.doc-info { flex: 1; }
.doc-name { font-weight: 700; font-size: 15px; color: var(--text); }
.doc-meta { font-size: 13px; color: var(--text-mid); margin-top: 4px; }
.dl-btn { padding: 8px 16px; background: var(--red); color: var(--white); border: none; border-radius: 2px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
.form-group-inline { margin-bottom: 18px; }
.form-group-inline label { display: block; font-size: 13px; font-weight: 700; color: var(--gray-dark); margin-bottom: 8px; }
.form-group-inline input, .form-group-inline select, .form-group-inline textarea { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-mid); border-radius: 2px; font-size: 15px; outline: none; background: #fafafa; }
.form-group-inline textarea { resize: vertical; min-height: 100px; }
.submit-btn { width: 100%; padding: 16px; background: var(--red); color: var(--white); border: none; border-radius: 2px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 8px; letter-spacing: 1px; }
.submit-btn:hover { background: var(--red-dark); }
.submit-btn-outline { width: 100%; padding: 14px; background: var(--white); color: var(--red); border: 2px solid var(--red); border-radius: 2px; font-size: 15px; font-weight: 800; cursor: pointer; margin-bottom: 12px; }
.email-notify-box { background: #f8fafc; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
.email-notify-box .title { font-size: 13px; font-weight: 700; color: var(--gray-dark); margin-bottom: 10px; }
.email-notify-box label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; padding: 4px 0; }
.loading { text-align: center; padding: 60px 20px; color: var(--text-mid); font-size: 15px; }
.loading::before { content: ''; display: block; width: 40px; height: 40px; border: 3px solid var(--gray-mid); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-mark">
        <div class="logo-n">N</div>
        <div class="logo-mec">MEC</div>
      </div>
      <div class="auth-logo-text">
        <h1>新潟市異業種交流<br>研究会協同組合</h1>
        <p>Niigata City Multi-Enterprise<br>Exchange Cooperative Union</p>

      <div class="form-group">
        <label>会社名</label>

      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="signup-email" placeholder="example@email.com">
      </div>
      <div class="form-group">

</div>

<div id="app-screen">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-mark">
        <div class="sidebar-logo-n">N</div>
        <div class="sidebar-logo-mec">MEC</div>
      </div>
      <div class="sidebar-header-text">
        <h2>新潟市異業種交流<br>研究会協同組合</h2>
        <p>会員専用プラットフォーム</p>
      </div>
    </div>
    <div style="padding:12px 0;flex:1;overflow-y:auto">
      <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')"><span class="nav-icon">🏠</span>ダッシュボード</div>

    </div>
  </div>

  <div class="header">

      <div class="header-logo-mark">
        <div class="header-logo-n">N</div>

      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

    </button>

      お知らせ

<script>
const SUPABASE_URL = 'https://cadindivyghcjlbetsoi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhZGluZGl2eWdoY2psYmV0c29pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTgzMDQsImV4cCI6MjA5MDM5NDMwNH0.teIhuA9o6NsuLE_QmYsIYmISf0dxG0FsCBQHPkixm2c';
const API = SUPABASE_URL + '/rest/v1';
const AUTH = SUPABASE_URL + '/auth/v1';

let currentUser = null, currentProfile = null, currentPage = 'dashboard', accessToken = null;
const hdrs = () => ({ 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + (accessToken || SUPABASE_KEY) });

function emailNotifyBox(name) {
  return '<div class="email-notify-box"><div class="title">📧 メール通知</div>' +
    '<label><input type="radio" name="' + name + '" value="none" checked> 送らない</label>' +
    '<label><input type="radio" name="' + name + '" value="directors"> 理事長・副理事長のみ</label>' +
    '<label><input type="radio" name="' + name + '" value="all"> 全理事及び監事</label></div>';
}

async function sendEmailNotification(type, data) {
  try {
    const emailMode = data.emailMode;
    if (!emailMode || emailMode === 'none') return;
    await axios.post('/api/send-email', { type, ...data });
  } catch(e) { console.error('メール送信エラー:', e); }
}

function checkRsvpUrl() {
  const params = new URLSearchParams(window.location.search);
  const rsvpId = params.get('rsvp');
  if (rsvpId) window._pendingRsvp = rsvpId;
}

function toggleForm(type) {
  document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = type === 'signup' ? 'block' : 'none';
  document.getElementById('auth-error').style.display = 'none';
}

async function login() {
  const email = document.getElementById('login-email').value;
  const pw = document.getElementById('login-password').value;
  try {
    const res = await axios.post(AUTH + '/token?grant_type=password', { email, password: pw }, { headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY } });
    accessToken = res.data.access_token; currentUser = res.data.user;
    await loadProfile(); showApp();
  } catch(e) { showError('メールアドレスまたはパスワードが正しくありません'); }
}

async function signup() {
  const name = document.getElementById('signup-name').value;
  const company = document.getElementById('signup-company').value;
  const email = document.getElementById('signup-email').value;
  const pw = document.getElementById('signup-password').value;
  if (!name || !email || !pw) { showError('必須項目を入力してください'); return; }
  try {

  } catch(e) { showError('登録に失敗しました。メールアドレスをご確認ください。'); }

function showError(msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.style.display = 'block'; }

function showApp() {

function roleLabel(r) { return { admin:'管理者', office:'事務局', director:'理事・委員長', member:'一般会員' }[r] || r; }
function typeLabel(t) { return { sanyaku:'三役会議', rijikai:'理事会', reikai:'例会', iinkai:'委員会', jigyou:'その他事業', other:'その他' }[t] || t; }
function fmtDate(d) { const dt = new Date(d); return dt.getFullYear() + '年' + (dt.getMonth()+1) + '月' + dt.getDate() + '日 ' + dt.getHours() + ':' + String(dt.getMinutes()).padStart(2,'0'); }
function fmtDateShort(d) { const dt = new Date(d); return dt.getFullYear() + '/' + (dt.getMonth()+1) + '/' + dt.getDate(); }

function navigate(page) {
  currentPage = page;
  closeSidebar();
  const titles = { dashboard:'ダッシュボード', events:'会議・事業', motions:'資料', members:'理事メンバー', documents:'資料ライブラリ', notices:'お知らせ', committees:'委員会管理' };
  document.getElementById('header-title').textContent = titles[page] || '';
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.bottom-nav button').forEach(function(el) { el.classList.remove('active'); });
  const ni = document.getElementById('nav-' + page), bi = document.getElementById('bn-' + page);
  if (ni) ni.classList.add('active');
  if (bi) bi.classList.add('active');
  const pages = { dashboard: renderDashboard, events: renderEvents, motions: renderMotions, members: renderMembers, notices: renderNotices, committees: renderCommittees };
  if (pages[page]) pages[page]();

async function autoCloseEvents() {

  await autoCloseEvents();

  el.innerHTML = '<div class="loading"></div>';

    const [evRes, notRes] = await Promise.all([
      axios.get(API + '/events?status=eq.published&order=date.asc&limit=3', { headers: hdrs() }),

async function updateEvent(id) {
  const title = document.getElementById('ev-title').value;
  const date = document.getElementById('ev-date').value;
  if (!title || !date) { alert('タイトルと日時は必須です'); return; }
  const btn = document.querySelector('#main-content .submit-btn');

  try {
    await axios.patch(API + '/events?id=eq.' + id, { title, type: document.getElementById('ev-type').value, date: new Date(date).toISOString(), location: document.getElementById('ev-location').value, description: document.getElementById('ev-desc').value, committee: document.getElementById('ev-committee').value || null }, { headers: Object.assign({}, hdrs(), { 'Prefer': 'return=minimal' }) });

      const fileUrl = SUPABASE_URL + '/storage/v1/object/public/documents/' + filePath;

      const fileCat = document.getElementById('ev-file-category').value;

    }
    alert('更新しました！'); navigate('events');
  } catch(e) { alert('更新に失敗しました'); btn.textContent = '更新する'; btn.disabled = false; }
}

async function showEventDetail(id) {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const eRes = await axios.get(API + '/events?id=eq.' + id, { headers: hdrs() });
    const allEvRes = await axios.get(API + '/events?order=date.asc', { headers: hdrs() });

    const allARes = await axios.get(API + '/attendances?event_id=eq.' + id, { headers: hdrs() });
    const uRes = await axios.get(API + '/users?is_active=eq.true&email=neq.info@nmec.jp&order=sort_order.asc,name.asc', { headers: hdrs() });
    const dRes = await axios.get(API + '/documents?event_id=eq.' + id + '&order=created_at.desc', { headers: hdrs() });
    const e = eRes.data[0], allEvs = allEvRes.data, myAtt = aRes.data[0], allAtts = allARes.data, users = uRes.data, docs = dRes.data;
    const agenda = e.agenda || [];

    const canUpload = ['admin','office','director'].includes(currentProfile.role);
    const rsvpUrl = window.location.origin + window.location.pathname + '?rsvp=' + id;

    } else {
      navHtml += '<div></div>';
    }

    } else {
      navHtml += '<div></div>';
    }
    navHtml += '</div>';

    let rsvpHtml = '';
    if (e.status === 'published') {
      rsvpHtml = '<div class="card card-accent"><div class="section-title">✋ 出欠回答</div>' + (cur ? '<p style="font-size:14px;color:var(--text-mid);margin-bottom:12px">現在の回答：<span class="badge ' + (cur==='attend'?'badge-green':cur==='absent'?'badge-red':'badge-gray') + '">' + (cur==='attend'?'出席':cur==='absent'?'欠席':'保留') + '</span></p>' : '') + '<div class="rsvp-btns"><button class="rsvp-btn ' + (cur==='attend'?'selected-attend':'') + '" onclick="submitRsvp(\'' + id + '\',\'attend\',\'' + (myAtt?myAtt.id:'') + '\')">✅ 出席</button><button class="rsvp-btn ' + (cur==='absent'?'selected-absent':'') + '" onclick="submitRsvp(\'' + id + '\',\'absent\',\'' + (myAtt?myAtt.id:'') + '\')">❌ 欠席</button><button class="rsvp-btn ' + (cur==='pending'?'selected-pending':'') + '" onclick="submitRsvp(\'' + id + '\',\'pending\',\'' + (myAtt?myAtt.id:'') + '\')">🤔 保留</button></div></div>';
    }

    const attendCount = allAtts.filter(function(a) { return a.status === 'attend'; }).length;
    const absentCount = allAtts.filter(function(a) { return a.status === 'absent'; }).length;
    const pendingCount = allAtts.filter(function(a) { return a.status === 'pending'; }).length;
    const answeredIds = allAtts.map(function(a) { return a.user_id; });
    const unansweredCount = users.filter(function(u) { return !answeredIds.includes(u.id); }).length;

    let rsvpListHtml = '<div class="card"><div class="section-title">📊 出欠集計</div>' +
      '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">' +
      '<div style="text-align:center;background:#e8f5e9;border-radius:8px;padding:12px 20px;flex:1"><div style="font-size:28px;font-weight:800;color:#2e7d32">' + attendCount + '</div><div style="font-size:12px;color:#2e7d32;font-weight:700">出席</div></div>' +
      '<div style="text-align:center;background:#fef2f2;border-radius:8px;padding:12px 20px;flex:1"><div style="font-size:28px;font-weight:800;color:var(--red)">' + absentCount + '</div><div style="font-size:12px;color:var(--red);font-weight:700">欠席</div></div>' +
      '<div style="text-align:center;background:#fff8e1;border-radius:8px;padding:12px 20px;flex:1"><div style="font-size:28px;font-weight:800;color:#f59e0b">' + pendingCount + '</div><div style="font-size:12px;color:#f59e0b;font-weight:700">保留</div></div>' +
      '<div style="text-align:center;background:#f5f5f5;border-radius:8px;padding:12px 20px;flex:1"><div style="font-size:28px;font-weight:800;color:#999">' + unansweredCount + '</div><div style="font-size:12px;color:#999;font-weight:700">未回答</div></div>' +

function copyRsvpUrl(url) {
  navigator.clipboard.writeText(url).then(function() { alert('URLをコピーしました！'); }).catch(function() { prompt('以下のURLをコピーしてください', url); });
}

async function submitRsvp(eventId, status, existingId) {
  try {
    if (existingId) {
      await axios.patch(API + '/attendances?id=eq.' + existingId, { status, responded_at: new Date().toISOString() }, { headers: Object.assign({}, hdrs(), { 'Prefer': 'return=minimal' }) });
    } else {
      await axios.post(API + '/attendances', { event_id: eventId, user_id: currentUser.id, status }, { headers: hdrs() });
    }
    showEventDetail(eventId);
  } catch(e) { alert('回答の送信に失敗しました'); }
}

async function deleteDocument(docId, eventId) {
  if (!confirm('この資料を削除しますか？')) return;
  try {
    await axios.delete(API + '/documents?id=eq.' + docId, { headers: hdrs() });
    if (eventId) showEventDetail(eventId);
    else renderMotions();
  } catch(e) { alert('削除に失敗しました'); }
}

async function uploadDocument(eventId) {
  const name = document.getElementById('upload-name').value;
  const file = document.getElementById('upload-file').files[0];
  if (!name) { alert('ファイル名を入力してください'); return; }
  if (!file) { alert('ファイルを選択してください'); return; }
  const btn = document.querySelector('#main-content .submit-btn');
  btn.textContent = 'アップロード中...'; btn.disabled = true;
  try {
    const ext = file.name.split('.').pop();
    const filePath = 'events/' + eventId + '/' + Date.now() + '.' + ext;
    await axios.post(SUPABASE_URL + '/storage/v1/object/documents/' + filePath, file, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + accessToken, 'Content-Type': file.type } });
    const fileUrl = SUPABASE_URL + '/storage/v1/object/public/documents/' + filePath;
    await axios.post(API + '/documents', { name, event_id: eventId, file_url: fileUrl, file_size: (file.size/1024).toFixed(0)+'KB', category: document.getElementById('upload-category').value, year: new Date().getFullYear(), uploaded_by: currentUser.id }, { headers: hdrs() });
    alert('アップロード完了！'); showEventDetail(eventId);
  } catch(e) { alert('アップロードに失敗しました'); btn.textContent = 'アップロードする'; btn.disabled = false; }
}

  el.innerHTML = '<button class="back-btn" onclick="navigate(\'notices\')">← 一覧に戻る</button><div class="card card-accent"><div class="section-title">🔔 お知らせを投稿</div><div class="form-group-inline"><label>タイトル *</label><input type="text" id="no-title" placeholder="タイトルを入力"></div><div class="form-group-inline"><label>本文</label><textarea id="no-body" placeholder="内容を入力" style="min-height:140px"></textarea></div><div class="form-group-inline"><label>優先度</label><select id="no-priority"><option value="normal">通常</option><option value="important">重要</option></select></div><div class="form-group-inline"><label>添付ファイル（任意）</label><input type="text" id="no-file-name" placeholder="ファイルの表示名（例：R8年度総会資料）" style="width:100%;padding:10px 14px;border:1.5px solid var(--gray-mid);border-radius:2px;font-size:14px;margin-bottom:10px"><select id="no-file-category" style="width:100%;padding:10px 14px;border:1.5px solid var(--gray-mid);border-radius:2px;font-size:14px;margin-bottom:10px"><option value="">カテゴリを選択...</option><option value="kumiai">組合資料</option><option value="keikaku">計画資料</option><option value="rijikai">理事会資料</option><option value="sanyaku">三役資料</option><option value="reikai">例会資料</option><option value="other">その他</option></select><input type="file" id="no-file" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.png" style="width:100%;padding:8px 0;font-size:14px"></div><button class="submit-btn" onclick="submitNewNotice()">投稿する</button></div>';
}

async function submitNewNotice() {
  const title = document.getElementById('no-title').value;
  if (!title) { alert('タイトルは必須です'); return; }
  const btn = document.querySelector('#main-content .submit-btn');
  btn.textContent = '投稿中...'; btn.disabled = true;
  try {
    let fileUrl = null;
    const file = document.getElementById('no-file').files[0];
    const fileCat = document.getElementById('no-file-category').value;
    const fileDisplayName = document.getElementById('no-file-name').value;
    if (file) {
      const ext = file.name.split('.').pop();
      const filePath = 'notices/' + Date.now() + '.' + ext;
      await axios.post(SUPABASE_URL + '/storage/v1/object/documents/' + filePath, file, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + accessToken, 'Content-Type': file.type } });
      fileUrl = SUPABASE_URL + '/storage/v1/object/public/documents/' + filePath;
      if (fileCat) await axios.post(API + '/documents', { name: fileDisplayName||title+'（添付）', file_url: fileUrl, file_size: (file.size/1024).toFixed(0)+'KB', category: fileCat, year: new Date().getFullYear(), uploaded_by: currentUser.id }, { headers: hdrs() });
    }
    await axios.post(API + '/notices', { title, body: document.getElementById('no-body').value, priority: document.getElementById('no-priority').value, file_url: fileUrl, created_by: currentUser.id }, { headers: hdrs() });
    alert('投稿しました！'); navigate('notices');
  } catch(e) { alert('投稿に失敗しました'); btn.textContent = '投稿する'; btn.disabled = false; }
}

async function showNoticeEditForm(id) {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const res = await axios.get(API + '/notices?id=eq.' + id, { headers: hdrs() });
    const n = res.data[0];
    el.innerHTML = '<button class="back-btn" onclick="navigate(\'notices\')">← 一覧に戻る</button><div class="card card-accent"><div class="section-title">🔔 お知らせを編集</div><div class="form-group-inline"><label>タイトル *</label><input type="text" id="no-title" value="'+n.title+'"></div><div class="form-group-inline"><label>本文</label><textarea id="no-body" style="min-height:140px">'+(n.body||'')+'</textarea></div><div class="form-group-inline"><label>優先度</label><select id="no-priority"><option value="normal"'+(n.priority==='normal'?' selected':'')+'>通常</option><option value="important"'+(n.priority==='important'?' selected':'')+'>重要</option></select></div>'+(n.file_url?'<div style="padding:10px 0;border-top:1px solid var(--gray);margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--gray-dark);margin-bottom:6px">現在の添付ファイル</div><a href="'+n.file_url+'" target="_blank" style="color:var(--red);font-size:14px;font-weight:700;text-decoration:none">📎 '+decodeURIComponent(n.file_url.split('/').pop())+'</a></div>':'')+'<div class="form-group-inline"><label>新しい添付ファイル（任意）</label><input type="text" id="no-file-name" placeholder="ファイルの表示名" style="width:100%;padding:10px 14px;border:1.5px solid var(--gray-mid);border-radius:2px;font-size:14px;margin-bottom:10px"><select id="no-file-category" style="width:100%;padding:10px 14px;border:1.5px solid var(--gray-mid);border-radius:2px;font-size:14px;margin-bottom:10px"><option value="">カテゴリを選択...</option><option value="kumiai">組合資料</option><option value="keikaku">計画資料</option><option value="rijikai">理事会資料</option><option value="sanyaku">三役資料</option><option value="reikai">例会資料</option><option value="other">その他</option></select><input type="file" id="no-file" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.png" style="width:100%;padding:8px 0;font-size:14px"></div><button class="submit-btn" onclick="updateNotice(\''+id+'\')">更新する</button></div>';
  } catch(e) { alert('読み込みに失敗しました'); }

async function updateNotice(id) {
  const title = document.getElementById('no-title').value;
  if (!title) { alert('タイトルは必須です'); return; }
  const btn = document.querySelector('#main-content .submit-btn');
  btn.textContent = '更新中...'; btn.disabled = true;
  try {
    let fileUrl = null;
    const file = document.getElementById('no-file').files[0];
    const fileCat = document.getElementById('no-file-category').value;
    const fileDisplayName = document.getElementById('no-file-name').value;
    if (file) {
      const ext = file.name.split('.').pop();
      const filePath = 'notices/' + Date.now() + '.' + ext;
      await axios.post(SUPABASE_URL + '/storage/v1/object/documents/' + filePath, file, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + accessToken, 'Content-Type': file.type } });
      fileUrl = SUPABASE_URL + '/storage/v1/object/public/documents/' + filePath;
      if (fileCat) await axios.post(API + '/documents', { name: fileDisplayName||title+'（添付）', file_url: fileUrl, file_size: (file.size/1024).toFixed(0)+'KB', category: fileCat, year: new Date().getFullYear(), uploaded_by: currentUser.id }, { headers: hdrs() });
    }
    const updateData = { title, body: document.getElementById('no-body').value, priority: document.getElementById('no-priority').value };
    if (fileUrl) updateData.file_url = fileUrl;
    await axios.patch(API + '/notices?id=eq.' + id, updateData, { headers: Object.assign({}, hdrs(), { 'Prefer': 'return=minimal' }) });
    alert('更新しました！'); navigate('notices');
  } catch(e) { alert('更新に失敗しました'); btn.textContent = '更新する'; btn.disabled = false; }
}

async function renderCommittees() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const cRes = await axios.get(API + '/committees?order=sort_order.asc', { headers: hdrs() });
    const uRes = await axios.get(API + '/users?is_active=eq.true&order=sort_order.asc,name.asc', { headers: hdrs() });
    const mRes = await axios.get(API + '/committee_members', { headers: hdrs() });
    const committees = cRes.data, users = uRes.data, allMembers = mRes.data;
    const canEdit = ['admin','office','director'].includes(currentProfile.role);
    const usersJson = encodeURIComponent(JSON.stringify(users));
    let html = canEdit ? '<button class="submit-btn-outline" onclick="showCommitteeForm(decodeURIComponent(\''+usersJson+'\'))">＋ 委員会を追加</button>' : '';
    if (committees.length === 0) html += '<div class="empty">委員会がまだありません</div>';
    committees.forEach(function(c) {
      const viceDirector = users.find(function(u) { return u.id === c.chair_id; });
      const members = allMembers.filter(function(m) { return m.committee_id === c.id; });
      const chair = members.find(function(m) { return m.role === 'chair'; });
      const viceChairs = members.filter(function(m) { return m.role === 'vice_chair'; });
      const chairUser = chair ? users.find(function(u) { return u.id === chair.user_id; }) : null;
      const viceChairUsers = viceChairs.map(function(v) { return users.find(function(u) { return u.id === v.user_id; }); }).filter(Boolean);
      function roleRow(label, color, person) {
        if (!person) return '';
        return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray)"><span style="font-size:11px;font-weight:800;color:'+color+';width:90px;flex-shrink:0">'+label+'</span><div><div style="font-size:15px;font-weight:700;color:var(--text)">'+person.name+'</div><div style="font-size:12px;color:var(--text-mid)">'+person.company+'</div></div></div>';
      }
      html += '<div class="card card-accent"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px"><div style="font-size:18px;font-weight:800;color:var(--gray-dark)">'+c.name+'</div>'+(canEdit?'<div style="display:flex;gap:6px"><button onclick="showMemberForm(\''+c.id+'\',decodeURIComponent(\''+usersJson+'\'))" style="background:var(--red);color:#fff;border:none;border-radius:2px;padding:5px 10px;font-size:12px;cursor:pointer">メンバー</button><button onclick="showCommitteeEdit(\''+c.id+'\',decodeURIComponent(\''+usersJson+'\'))" style="background:none;border:1px solid var(--gray-mid);border-radius:2px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text-mid)">編集</button></div>':'')+'</div>'+roleRow('担当副理事長','#1a7a4a',viceDirector)+roleRow('委員長','var(--red)',chairUser)+viceChairUsers.map(function(u){return roleRow('副委員長','#1a2e4a',u);}).join('')+'</div>';
    });
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="empty">読み込みに失敗しました</div>'; }
}

function showCommitteeForm(usersJson) {
  const users = JSON.parse(usersJson);
  const el = document.getElementById('main-content');
  const opts = users.map(function(u){return '<option value="'+u.id+'">'+u.name+'（'+u.company+'）</option>';}).join('');
  el.innerHTML = '<button class="back-btn" onclick="navigate(\'committees\')">← 一覧に戻る</button><div class="card card-accent"><div class="section-title">🏛️ 委員会を追加</div><div class="form-group-inline"><label>委員会名 *</label><input type="text" id="cm-name" placeholder="例：広報委員会"></div><div class="form-group-inline"><label>説明</label><input type="text" id="cm-desc" placeholder="委員会の活動内容"></div><div class="form-group-inline"><label>担当副理事長</label><select id="cm-chair"><option value="">未設定</option>'+opts+'</select></div><div class="form-group-inline"><label>表示順</label><input type="number" id="cm-order" value="0"></div><button class="submit-btn" onclick="submitCommittee()">追加する</button></div>';
}

async function submitCommittee() {
  const name = document.getElementById('cm-name').value;
  if (!name) { alert('委員会名は必須です'); return; }
  try {
    await axios.post(API + '/committees', { name, description: document.getElementById('cm-desc').value, chair_id: document.getElementById('cm-chair').value||null, sort_order: parseInt(document.getElementById('cm-order').value)||0 }, { headers: hdrs() });
    alert('追加しました！'); navigate('committees');
  } catch(e) { alert('追加に失敗しました'); }
}

async function showCommitteeEdit(id, usersJson) {
  const users = JSON.parse(usersJson);
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const res = await axios.get(API + '/committees?id=eq.' + id, { headers: hdrs() });
    const c = res.data[0];
    const opts = users.map(function(u){return '<option value="'+u.id+'"'+(u.id===c.chair_id?' selected':'')+'>'+u.name+'（'+u.company+'）</option>';}).join('');
    el.innerHTML = '<button class="back-btn" onclick="navigate(\'committees\')">← 一覧に戻る</button><div class="card card-accent"><div class="section-title">🏛️ 委員会を編集</div><div class="form-group-inline"><label>委員会名 *</label><input type="text" id="cm-name" value="'+c.name+'"></div><div class="form-group-inline"><label>説明</label><input type="text" id="cm-desc" value="'+(c.description||'')+'"></div><div class="form-group-inline"><label>担当副理事長</label><select id="cm-chair"><option value="">未設定</option>'+opts+'</select></div><div class="form-group-inline"><label>表示順</label><input type="number" id="cm-order" value="'+(c.sort_order||0)+'"></div><button class="submit-btn" onclick="updateCommittee(\''+id+'\')">更新する</button><button onclick="deleteCommittee(\''+id+'\')" style="width:100%;margin-top:10px;padding:12px;background:none;border:2px solid #ccc;border-radius:2px;font-size:14px;color:#999;cursor:pointer">この委員会を削除</button></div>';
  } catch(e) { alert('読み込みに失敗しました'); }
}

async function updateCommittee(id) {
  const name = document.getElementById('cm-name').value;
  if (!name) { alert('委員会名は必須です'); return; }
  try {
    await axios.patch(API + '/committees?id=eq.' + id, { name, description: document.getElementById('cm-desc').value, chair_id: document.getElementById('cm-chair').value||null, sort_order: parseInt(document.getElementById('cm-order').value)||0 }, { headers: Object.assign({}, hdrs(), { 'Prefer': 'return=minimal' }) });
    alert('更新しました！'); navigate('committees');
  } catch(e) { alert('更新に失敗しました'); }
}

async function deleteCommittee(id) {
  if (!confirm('この委員会を削除しますか？')) return;
  try { await axios.delete(API + '/committees?id=eq.' + id, { headers: hdrs() }); alert('削除しました'); navigate('committees'); }
  catch(e) { alert('削除に失敗しました'); }
}

async function showMemberForm(committeeId, usersJson) {
  const users = JSON.parse(usersJson);
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const cRes = await axios.get(API + '/committees?id=eq.' + committeeId, { headers: hdrs() });
    const mRes = await axios.get(API + '/committee_members?committee_id=eq.' + committeeId, { headers: hdrs() });
    const committee = cRes.data[0], members = mRes.data;
    const memberIds = members.map(function(m){return m.user_id;});
    const nonMembers = users.filter(function(u){return !memberIds.includes(u.id);});
    const usersJsonEnc = encodeURIComponent(usersJson);
    let memberHtml = members.length===0?'<div style="color:#aaa;font-size:14px;padding:10px 0">メンバーがいません</div>':members.map(function(m){const u=users.find(function(x){return x.id===m.user_id;});const rl={chair:'委員長',vice_chair:'副委員長',vice_director:'担当副理事長',member:'メンバー'}[m.role]||m.role;return u?'<div class="row"><div><div class="row-title">'+u.name+' <span class="badge badge-gray">'+rl+'</span></div><div class="row-sub">'+u.company+'</div></div><button onclick="removeMember(\''+m.id+'\',\''+committeeId+'\',decodeURIComponent(\''+usersJsonEnc+'\'))" style="background:none;border:1px solid #ccc;border-radius:2px;padding:4px 10px;font-size:12px;cursor:pointer;color:#999">削除</button></div>':'';}).join('');
    const addOpts = nonMembers.map(function(u){return '<option value="'+u.id+'">'+u.name+'（'+u.company+'）</option>';}).join('');
    el.innerHTML = '<button class="back-btn" onclick="navigate(\'committees\')">← 一覧に戻る</button><div class="card card-accent"><div style="font-size:18px;font-weight:800;margin-bottom:16px">'+committee.name+' メンバー管理</div><div class="section-title">現在のメンバー</div>'+memberHtml+'</div><div class="card"><div class="section-title">メンバーを追加</div><div class="form-group-inline"><label>役割</label><select id="add-member-role"><option value="chair">委員長</option><option value="vice_chair">副委員長</option><option value="vice_director">担当副理事長</option><option value="member">メンバー</option></select></div><div class="form-group-inline"><label>会員を選択</label><select id="add-member-select"><option value="">選択してください...</option>'+addOpts+'</select></div><button class="submit-btn" onclick="addMember(\''+committeeId+'\',decodeURIComponent(\''+usersJsonEnc+'\'))">追加する</button></div>';
  } catch(e) { alert('読み込みに失敗しました'); }
}

async function addMember(committeeId, usersJson) {
  const userId = document.getElementById('add-member-select').value;
  const role = document.getElementById('add-member-role').value;
  if (!userId) { alert('会員を選択してください'); return; }
  try { await axios.post(API + '/committee_members', { committee_id: committeeId, user_id: userId, role }, { headers: hdrs() }); showMemberForm(committeeId, usersJson); }
  catch(e) { alert('追加に失敗しました'); }
}

async function removeMember(memberId, committeeId, usersJson) {
  if (!confirm('このメンバーを削除しますか？')) return;
  try { await axios.delete(API + '/committee_members?id=eq.' + memberId, { headers: hdrs() }); showMemberForm(committeeId, usersJson); }
  catch(e) { alert('削除に失敗しました'); }
}
