<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-MEC 会員プラットフォーム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f5f5f5; color: #1a1a1a; }

  :root {
    --red: #CC0000;
    --red-dark: #990000;
    --red-light: #fff0f0;
    --white: #ffffff;
    --gray: #f5f5f5;
    --gray-mid: #e0e0e0;
    --gray-dark: #333333;
    --text: #1a1a1a;
    --text-mid: #666666;
    --gold: #C9A84C;
  }

  /* ===== AUTH ===== */
  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
    background: #1a1a1a;
  }
  .auth-box {
    background: var(--white); border-radius: 4px;
    padding: 48px 40px; width: 100%; max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .auth-logo {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 36px; padding-bottom: 28px;
    border-bottom: 2px solid var(--red);
  }
  .logo-mark {
    width: 72px; height: 88px; background: var(--red);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex-shrink: 0;
    padding: 8px;
  }
  .logo-n { font-size: 38px; font-weight: 900; color: var(--white); line-height: 1; }
  .logo-mec { font-size: 18px; font-weight: 900; color: var(--white); line-height: 1; letter-spacing: 2px; }
  .auth-logo-text h1 { font-size: 15px; font-weight: 800; color: var(--gray-dark); line-height: 1.4; }
  .auth-logo-text p { font-size: 11px; color: var(--text-mid); margin-top: 4px; line-height: 1.5; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--gray-dark); margin-bottom: 8px; letter-spacing: 0.5px; }
  .form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--gray-mid); border-radius: 2px; font-size: 16px; outline: none; transition: border-color 0.2s; background: #fafafa; }
  .form-group input:focus { border-color: var(--red); background: var(--white); }
  .btn-primary { width: 100%; padding: 16px; background: var(--red); color: var(--white); border: none; border-radius: 2px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: background 0.2s; }
  .btn-primary:hover { background: var(--red-dark); }
  .auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-mid); }
  .auth-switch a { color: var(--red); cursor: pointer; font-weight: 700; }
  .error-msg { background: var(--red-light); color: var(--red); padding: 12px 16px; border-left: 4px solid var(--red); border-radius: 2px; font-size: 14px; margin-bottom: 20px; }

  /* ===== APP ===== */
  #app-screen { display: none; }

  .header {
    height: 64px; background: var(--red);
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header-menu { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--white); padding: 4px; }
  .header-logo { display: flex; align-items: center; gap: 10px; flex: 1; }
  .header-logo-mark { width: 36px; height: 44px; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .header-logo-n { font-size: 20px; font-weight: 900; color: var(--red); line-height: 1; }
  .header-logo-mec { font-size: 9px; font-weight: 900; color: var(--red); line-height: 1; letter-spacing: 1px; }
  .header-title { font-size: 16px; font-weight: 700; color: var(--white); letter-spacing: 1px; }
  .header-badge { background: var(--white); color: var(--red); border-radius: 99px; font-size: 12px; padding: 3px 10px; font-weight: 800; }

  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
  .sidebar {
    width: 280px; background: #1a1a1a; height: 100vh;
    display: flex; flex-direction: column;
    position: fixed; left: -280px; top: 0; z-index: 100;
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .sidebar.open { left: 0; }
  .sidebar-header {
    padding: 0; background: var(--red);
    display: flex; align-items: center; gap: 16px;
    height: 100px; padding: 0 24px;
  }
  .sidebar-logo-mark { width: 52px; height: 64px; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .sidebar-logo-n { font-size: 28px; font-weight: 900; color: var(--red); line-height: 1; }
  .sidebar-logo-mec { font-size: 13px; font-weight: 900; color: var(--red); line-height: 1; letter-spacing: 2px; }
  .sidebar-header-text h2 { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.5; }
  .sidebar-header-text p { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }

  .nav-section { padding: 16px 0 8px; }
  .nav-section-label { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 2px; padding: 0 24px; margin-bottom: 4px; }
  .nav-item {
    padding: 14px 24px; cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    color: rgba(255,255,255,0.6); font-size: 15px;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
  .nav-item.active { background: rgba(204,0,0,0.2); border-left-color: var(--red); color: var(--white); font-weight: 700; }
  .nav-icon { font-size: 18px; width: 24px; text-align: center; }
  .sidebar-user {
    padding: 20px 24px; border-top: 1px solid rgba(255,255,255,0.1);
    margin-top: auto;
  }
  .sidebar-user-role { font-size: 11px; color: var(--red); letter-spacing: 1px; font-weight: 700; margin-bottom: 4px; }
  .sidebar-user-name { font-size: 16px; font-weight: 700; color: var(--white); }
  .sidebar-user-company { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }
  .logout-btn { margin-top: 14px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15); border-radius: 2px; padding: 8px 16px; font-size: 13px; cursor: pointer; width: 100%; transition: all 0.15s; }
  .logout-btn:hover { background: rgba(255,255,255,0.15); color: var(--white); }

  .main { padding: 20px 16px; max-width: 720px; margin: 0 auto; }

  .bottom-nav {
    background: var(--white); border-top: 2px solid var(--red);
    display: flex; justify-content: space-around; padding: 8px 0;
    position: sticky; bottom: 0; z-index: 40;
  }
  .bottom-nav button {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    padding: 6px 12px; color: var(--text-mid); font-size: 11px; font-weight: 600;
    transition: color 0.15s;
  }
  .bottom-nav button.active { color: var(--red); }
  .bn-icon { font-size: 22px; }

  /* ===== CARDS ===== */
  .card {
    background: var(--white); border-radius: 4px;
    padding: 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 16px; border-top: 3px solid transparent;
  }
  .card-accent { border-top-color: var(--red); }
  .section-title {
    font-size: 11px; font-weight: 800; color: var(--text-mid);
    margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--gray-mid); }

  .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 2px; font-weight: 700; white-space: nowrap; letter-spacing: 0.5px; }
  .badge-red { background: var(--red); color: var(--white); }
  .badge-red-light { background: var(--red-light); color: var(--red); }
  .badge-dark { background: var(--gray-dark); color: var(--white); }
  .badge-gray { background: var(--gray-mid); color: var(--text-mid); }
  .badge-gold { background: var(--gold); color: var(--white); }
  .badge-green { background: #1a7a4a; color: var(--white); }

  .welcome-card {
    background: var(--red); border-radius: 4px;
    padding: 28px 24px; color: var(--white); margin-bottom: 16px;
    position: relative; overflow: hidden;
  }
  .welcome-card::before {
    content: 'N'; position: absolute; right: -10px; top: -20px;
    font-size: 140px; font-weight: 900; color: rgba(255,255,255,0.08);
    line-height: 1; pointer-events: none;
  }
  .welcome-card small { font-size: 12px; opacity: 0.7; letter-spacing: 1px; }
  .welcome-card h2 { font-size: 22px; font-weight: 800; margin-top: 6px; }
  .welcome-card p { font-size: 13px; opacity: 0.75; margin-top: 6px; }

  .alert-card {
    background: #fff8e1; border: none; border-left: 4px solid #f59e0b;
    border-radius: 4px; padding: 16px 20px; margin-bottom: 16px;
  }
  .alert-card h4 { font-weight: 800; color: #92400e; margin-bottom: 8px; font-size: 14px; }

  .row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--gray); }
  .row:last-child { border-bottom: none; }
  .row-title { font-weight: 700; font-size: 15px; color: var(--text); }
  .row-sub { font-size: 13px; color: var(--text-mid); margin-top: 4px; }

  .back-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 15px; margin-bottom: 20px; padding: 0; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .detail-title { font-size: 20px; font-weight: 800; color: var(--gray-dark); margin: 12px 0 20px; line-height: 1.4; }
  .detail-row { padding: 12px 0; border-bottom: 1px solid var(--gray); display: flex; gap: 16px; }
  .detail-label { font-size: 12px; color: var(--text-mid); width: 80px; flex-shrink: 0; font-weight: 700; letter-spacing: 0.5px; padding-top: 2px; }
  .detail-value { font-size: 15px; color: var(--text); }

  .rsvp-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
  .rsvp-btn { padding: 14px 24px; border: 2px solid var(--gray-mid); border-radius: 4px; background: var(--white); cursor: pointer; font-size: 15px; font-weight: 700; color: var(--text); transition: all 0.15s; }
  .rsvp-btn:hover { border-color: var(--red); color: var(--red); }
  .rsvp-btn.selected-attend { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }
  .rsvp-btn.selected-absent { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .rsvp-btn.selected-pending { background: #fff8e1; border-color: #f59e0b; color: #92400e; }

  .search-input { width: 100%; padding: 14px 18px; border: 1.5px solid var(--gray-mid); border-radius: 4px; font-size: 16px; outline: none; margin-bottom: 16px; background: var(--white); }
  .search-input:focus { border-color: var(--red); }

  .filter-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { padding: 8px 18px; border-radius: 2px; border: 1.5px solid var(--gray-mid); cursor: pointer; font-size: 13px; font-weight: 700; background: var(--white); color: var(--text-mid); letter-spacing: 0.5px; transition: all 0.15s; }
  .filter-btn.active { background: var(--red); color: var(--white); border-color: var(--red); }

  .avatar { width: 48px; height: 48px; border-radius: 2px; background: var(--red); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 20px; font-weight: 800; flex-shrink: 0; }
  .avatar-lg { width: 72px; height: 72px; font-size: 28px; }

  .member-row { display: flex; gap: 16px; align-items: center; }
  .member-info { flex: 1; }
  .member-name { font-weight: 800; font-size: 16px; color: var(--text); }
  .member-sub { font-size: 13px; color: var(--text-mid); margin-top: 4px; }

  .doc-row { display: flex; gap: 14px; align-items: center; }
  .doc-icon { font-size: 32px; }
  .doc-info { flex: 1; }
  .doc-name { font-weight: 700; font-size: 15px; color: var(--text); }
  .doc-meta { font-size: 13px; color: var(--text-mid); margin-top: 4px; }
  .dl-btn { padding: 8px 16px; background: var(--red); color: var(--white); border: none; border-radius: 2px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; }

  .form-group-inline { margin-bottom: 18px; }
  .form-group-inline label { display: block; font-size: 13px; font-weight: 700; color: var(--gray-dark); margin-bottom: 8px; letter-spacing: 0.5px; }
  .form-group-inline input, .form-group-inline select, .form-group-inline textarea { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-mid); border-radius: 2px; font-size: 15px; outline: none; background: #fafafa; }
  .form-group-inline input:focus, .form-group-inline select:focus, .form-group-inline textarea:focus { border-color: var(--red); background: var(--white); }
  .form-group-inline textarea { resize: vertical; min-height: 100px; }
  .submit-btn { width: 100%; padding: 16px; background: var(--red); color: var(--white); border: none; border-radius: 2px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 8px; letter-spacing: 1px; transition: background 0.2s; }
  .submit-btn:hover { background: var(--red-dark); }
  .submit-btn-outline { width: 100%; padding: 14px; background: var(--white); color: var(--red); border: 2px solid var(--red); border-radius: 2px; font-size: 15px; font-weight: 800; cursor: pointer; margin-bottom: 12px; letter-spacing: 1px; }

  .loading { text-align: center; padding: 60px 20px; color: var(--text-mid); font-size: 15px; }
  .loading::before { content: ''; display: block; width: 40px; height: 40px; border: 3px solid var(--gray-mid); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }
  .empty::before { content: '📭'; display: block; font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- 認証画面 -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-mark">
        <div class="logo-n">N</div>
        <div class="logo-mec">MEC</div>
      </div>
      <div class="auth-logo-text">
        <h1>新潟市異業種交流<br>研究会協同組合</h1>
        <p>Niigata City Multi-Enterprise<br>Exchange Cooperative Union</p>
      </div>
    </div>
    <div id="auth-error" class="error-msg" style="display:none"></div>
    <div id="login-form">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="login-password" placeholder="パスワードを入力">
      </div>
      <button class="btn-primary" onclick="login()">ログイン</button>
      <div class="auth-switch">アカウントがない方は <a onclick="toggleForm('signup')">新規登録</a></div>
    </div>
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>お名前</label>
        <input type="text" id="signup-name" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label>会社名</label>
        <input type="text" id="signup-company" placeholder="株式会社〇〇">
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="signup-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="signup-password" placeholder="8文字以上">
      </div>
      <button class="btn-primary" onclick="signup()">新規登録</button>
      <div class="auth-switch">すでにアカウントをお持ちの方は <a onclick="toggleForm('login')">ログイン</a></div>
    </div>
  </div>
</div>

<!-- アプリ画面 -->
<div id="app-screen">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-mark">
        <div class="sidebar-logo-n">N</div>
        <div class="sidebar-logo-mec">MEC</div>
      </div>
      <div class="sidebar-header-text">
        <h2>新潟市異業種交流<br>研究会協同組合</h2>
        <p>会員専用プラットフォーム</p>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">MENU</div>
      <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')"><span class="nav-icon">🏠</span>ダッシュボード</div>
      <div class="nav-item" id="nav-events" onclick="navigate('events')"><span class="nav-icon">📅</span>例会・委員会</div>
      <div class="nav-item" id="nav-motions" onclick="navigate('motions')"><span class="nav-icon">📋</span>議案・議事録</div>
      <div class="nav-item" id="nav-members" onclick="navigate('members')"><span class="nav-icon">👥</span>理事メンバー</div>
      <div class="nav-item" id="nav-committees" onclick="navigate('committees')"><span class="nav-icon">🏛️</span>委員会管理</div>
      <div class="nav-item" id="nav-documents" onclick="navigate('documents')"><span class="nav-icon">📁</span>資料ライブラリ</div>
      <div class="nav-item" id="nav-notices" onclick="navigate('notices')"><span class="nav-icon">🔔</span>お知らせ</div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-role" id="sb-role">—</div>
      <div class="sidebar-user-name" id="sb-name">—</div>
      <div class="sidebar-user-company" id="sb-company">—</div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <div class="header">
    <button class="header-menu" onclick="toggleSidebar()">☰</button>
    <div class="header-logo">
      <div class="header-logo-mark">
        <div class="header-logo-n">N</div>
        <div class="header-logo-mec">MEC</div>
      </div>
      <div class="header-title" id="header-title">ダッシュボード</div>
    </div>
    <div class="header-badge" id="header-badge" style="display:none"></div>
  </div>

  <div class="main" id="main-content"></div>

  <div class="bottom-nav">
    <button onclick="navigate('dashboard')" id="bn-dashboard" class="active"><span class="bn-icon">🏠</span>ホーム</button>
    <button onclick="navigate('events')" id="bn-events"><span class="bn-icon">📅</span>例会</button>
    <button onclick="navigate('motions')" id="bn-motions"><span class="bn-icon">📋</span>議案</button>
    <button onclick="navigate('members')" id="bn-members"><span class="bn-icon">👥</span>理事</button>
    <button onclick="navigate('notices')" id="bn-notices"><span class="bn-icon">🔔</span>お知らせ</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://cadindivyghcjlbetsoi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhZGluZGl2eWdoY2psYmV0c29pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTgzMDQsImV4cCI6MjA5MDM5NDMwNH0.teIhuA9o6NsuLE_QmYsIYmISf0dxG0FsCBQHPkixm2c';
const API = SUPABASE_URL + '/rest/v1';
const AUTH = SUPABASE_URL + '/auth/v1';

let currentUser = null, currentProfile = null, currentPage = 'dashboard', accessToken = null;

const headers = () => ({ 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken || SUPABASE_KEY}` });

function toggleForm(type) {
  document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = type === 'signup' ? 'block' : 'none';
  document.getElementById('auth-error').style.display = 'none';
}

async function login() {
  const email = document.getElementById('login-email').value;
  const pw = document.getElementById('login-password').value;
  try {
    const res = await axios.post(`${AUTH}/token?grant_type=password`, { email, password: pw }, { headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY } });
    accessToken = res.data.access_token; currentUser = res.data.user;
    await loadProfile(); showApp();
  } catch(e) { showError('メールアドレスまたはパスワードが正しくありません'); }
}

async function signup() {
  const name = document.getElementById('signup-name').value;
  const company = document.getElementById('signup-company').value;
  const email = document.getElementById('signup-email').value;
  const pw = document.getElementById('signup-password').value;
  if (!name || !email || !pw) { showError('必須項目を入力してください'); return; }
  try {
    const res = await axios.post(`${AUTH}/signup`, { email, password: pw }, { headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY } });
    accessToken = res.data.access_token; currentUser = res.data.user;
    await axios.post(`${API}/users`, { id: currentUser.id, email, name, company, role: 'member' }, { headers: headers() });
    await loadProfile(); showApp();
  } catch(e) { showError('登録に失敗しました。メールアドレスをご確認ください。'); }
}

async function logout() {
  try { await axios.post(`${AUTH}/logout`, {}, { headers: headers() }); } catch(e) {}
  accessToken = null; currentUser = null; currentProfile = null;

function roleLabel(r) { return { admin:'管理者', office:'事務局', director:'理事・委員長', member:'一般会員' }[r] || r; }

function navigate(page) {
  currentPage = page;
  closeSidebar();
  const titles = { dashboard:'ダッシュボード', events:'例会・委員会', motions:'議案・議事録', members:'理事メンバー', documents:'資料ライブラリ', notices:'お知らせ', committees:'委員会管理' };
  document.getElementById('header-title').textContent = titles[page] || '';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.bottom-nav button').forEach(el => el.classList.remove('active'));
  const ni = document.getElementById('nav-' + page), bi = document.getElementById('bn-' + page);
  if (ni) ni.classList.add('active');
  if (bi) bi.classList.add('active');
  const pages = { dashboard: renderDashboard, events: renderEvents, motions: renderMotions, members: renderMembers, documents: renderDocuments, notices: renderNotices, committees: renderCommittees };
  if (pages[page]) pages[page]();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');

function fmtDate(d) { const dt = new Date(d); return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日 ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`; }
function fmtDateShort(d) { const dt = new Date(d); return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`; }
function typeLabel(t) { return { reikai:'例会', iinkai:'委員会', soukai:'総会', koryu:'交流会', other:'その他' }[t] || t; }

async function renderDashboard() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const [evRes, notRes] = await Promise.all([
      axios.get(`${API}/events?status=eq.published&order=date.asc&limit=3`, { headers: headers() }),
      axios.get(`${API}/notices?order=created_at.desc&limit=3`, { headers: headers() })
    ]);
    let html = `<div class="welcome-card">
      <small>WELCOME</small>
      <h2>${currentProfile.name || ''} 様</h2>
      <p>${currentProfile.company || ''}&nbsp;&nbsp;|&nbsp;&nbsp;${roleLabel(currentProfile.role)}</p>
    </div>`;

    if (evRes.data.length > 0) {
      html += `<div class="card card-accent"><div class="section-title">📅 次回の予定</div>`;
      evRes.data.forEach(e => {
        html += `<div class="row" onclick="showEventDetail('${e.id}')" style="cursor:pointer">
          <div><div class="row-title">${e.title}</div><div class="row-sub">🕐 ${fmtDate(e.date)}&nbsp;&nbsp;📍 ${e.location||''}</div></div>
          <span class="badge badge-red">${typeLabel(e.type)}</span>
        </div>`;
      });
      html += `</div>`;
    }

    if (notRes.data.length > 0) {
      html += `<div class="card"><div class="section-title">🔔 新着お知らせ</div>`;
      notRes.data.forEach(n => {
        html += `<div class="row" onclick="showNoticeDetail('${n.id}')" style="cursor:pointer">
          <div>
            ${n.priority==='important' ? '<span class="badge badge-red" style="margin-bottom:6px;display:inline-block">重要</span><br>' : ''}
            <div class="row-title">${n.title}</div>
            <div class="row-sub">${fmtDateShort(n.created_at)}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    if (evRes.data.length === 0 && notRes.data.length === 0) {
      html += `<div class="empty">データがまだありません</div>`;
    }
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="empty">データの読み込みに失敗しました</div>'; }
}

async function renderEvents() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';

    const res = await axios.get(`${API}/events?order=date.desc`, { headers: headers() });

  const statusBadge = e.status === 'done' ? '<span class="badge badge-gray">終了</span>' : '<span class="badge badge-green">開催予定</span>';
  return `<div class="card" data-type="${e.type}" onclick="showEventDetail('${e.id}')" style="cursor:pointer">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <span class="badge badge-red">${typeLabel(e.type)}</span>${statusBadge}

function filterEvents(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

  document.querySelectorAll('#events-list .card').forEach(card => {
    card.style.display = (type === 'all' || card.dataset.type === type) ? 'block' : 'none';

async function showEventDetail(id) {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const [eRes, aRes] = await Promise.all([
      axios.get(`${API}/events?id=eq.${id}`, { headers: headers() }),
      axios.get(`${API}/attendances?event_id=eq.${id}&user_id=eq.${currentUser.id}`, { headers: headers() })
    ]);
    const e = eRes.data[0], myAtt = aRes.data[0];
    const agenda = e.agenda || [];
    let rsvpHtml = '';
    if (e.status === 'published') {
      const cur = myAtt ? myAtt.status : null;
      rsvpHtml = `<div class="card card-accent"><div class="section-title">✋ 出欠回答</div>
        ${cur ? `<p style="font-size:14px;color:var(--text-mid);margin-bottom:12px">現在の回答：<span class="badge ${cur==='attend'?'badge-green':cur==='absent'?'badge-red':'badge-gold'}">${cur==='attend'?'出席':cur==='absent'?'欠席':'保留'}</span></p>` : ''}
        <div class="rsvp-btns">
          <button class="rsvp-btn ${cur==='attend'?'selected-attend':''}" onclick="submitRsvp('${id}','attend','${myAtt?.id||''}')">✅ 出席</button>
          <button class="rsvp-btn ${cur==='absent'?'selected-absent':''}" onclick="submitRsvp('${id}','absent','${myAtt?.id||''}')">❌ 欠席</button>
          <button class="rsvp-btn ${cur==='pending'?'selected-pending':''}" onclick="submitRsvp('${id}','pending','${myAtt?.id||''}')">🤔 保留</button>
        </div></div>`;
    }
    let agendaHtml = '';
    if (agenda.length > 0) {
      agendaHtml = `<div class="card"><div class="section-title">📝 アジェンダ</div>`;
      agenda.forEach((a, i) => { agendaHtml += `<div class="row"><span style="color:var(--red);font-weight:800;margin-right:10px;font-size:16px">${i+1}</span><span style="font-size:15px">${a}</span></div>`; });
      agendaHtml += `</div>`;
    }
    el.innerHTML = `
      <button class="back-btn" onclick="navigate('events')">← 一覧に戻る</button>
      <div class="card card-accent">
        <span class="badge badge-red">${typeLabel(e.type)}</span>
        <div class="detail-title">${e.title}</div>
        <div class="detail-row"><span class="detail-label">日時</span><span class="detail-value">${fmtDate(e.date)}</span></div>
        <div class="detail-row"><span class="detail-label">場所</span><span class="detail-value">${e.location||'未定'}</span></div>
        ${e.description ? `<div class="detail-row"><span class="detail-label">概要</span><span class="detail-value">${e.description}</span></div>` : ''}
        ${e.rsvp_deadline ? `<div class="detail-row"><span class="detail-label">出欠締切</span><span class="detail-value" style="color:var(--red);font-weight:700">${fmtDateShort(e.rsvp_deadline)}</span></div>` : ''}
      </div>
      ${rsvpHtml}${agendaHtml}`;
  } catch(e) { el.innerHTML = '<div class="empty">読み込みに失敗しました</div>'; }
}

async function submitRsvp(eventId, status, existingId) {
  try {
    if (existingId) {
      await axios.patch(`${API}/attendances?id=eq.${existingId}`, { status, responded_at: new Date().toISOString() }, { headers: { ...headers(), 'Prefer': 'return=minimal' } });
    } else {
      await axios.post(`${API}/attendances`, { event_id: eventId, user_id: currentUser.id, status }, { headers: headers() });
    }
    showEventDetail(eventId);
  } catch(e) { alert('回答の送信に失敗しました'); }
}

      </div>
      <button class="submit-btn" onclick="submitNewNotice()">投稿する</button>
    </div>`;
}

async function submitNewNotice() {
  const title = document.getElementById('no-title').value;
  if (!title) { alert('タイトルは必須です'); return; }
  try {
    await axios.post(`${API}/notices`, { title, body: document.getElementById('no-body').value, priority: document.getElementById('no-priority').value, created_by: currentUser.id }, { headers: headers() });
    alert('投稿しました！'); navigate('notices');
  } catch(e) { alert('投稿に失敗しました'); }
}

async function renderDocuments() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const res = await axios.get(`${API}/documents?order=created_at.desc`, { headers: headers() });
    const catLabels = { kiyaku:'規約・定款', gian:'議案資料', reikai:'例会資料', iinkai:'委員会資料', jigyou:'事業計画', gijiroku:'議事録', other:'その他' };
    let html = `<div class="filter-btns">
      <button class="filter-btn active" onclick="filterDocs('all',this)">すべて</button>
      <button class="filter-btn" onclick="filterDocs('reikai',this)">例会資料</button>
      <button class="filter-btn" onclick="filterDocs('gijiroku',this)">議事録</button>
      <button class="filter-btn" onclick="filterDocs('kiyaku',this)">規約</button>
    </div><div id="docs-list">`;
    if (res.data.length === 0) html += '<div class="empty">資料がまだありません</div>';
    res.data.forEach(d => {
      html += `<div class="card" data-cat="${d.category}">
        <div class="doc-row">
          <div class="doc-icon">📄</div>
          <div class="doc-info">
            <div class="doc-name">${d.name}</div>
            <div class="doc-meta" style="margin-top:6px">
              <span class="badge badge-red">${catLabels[d.category]||d.category}</span>
              <span style="margin-left:10px;font-size:13px">${d.year||''}年&nbsp;|&nbsp;${d.file_size||''}</span>
            </div>
          </div>
          <a href="${d.file_url}" target="_blank"><button class="dl-btn">表示</button></a>
        </div>
      </div>`;
    });
    html += `</div>`;
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="empty">読み込みに失敗しました</div>'; }
}

function filterDocs(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#docs-list .card').forEach(card => {
    card.style.display = (cat === 'all' || card.dataset.cat === cat) ? 'block' : 'none';
  });
}

// ==================== COMMITTEES ====================
async function renderCommittees() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const [cRes, uRes, mRes] = await Promise.all([
      axios.get(`${API}/committees?order=sort_order.asc`, { headers: headers() }),
      axios.get(`${API}/users?is_active=eq.true&order=name.asc`, { headers: headers() }),
      axios.get(`${API}/committee_members`, { headers: headers() })
    ]);
    const committees = cRes.data;
    const users = uRes.data;
    const allMembers = mRes.data;
    const canEdit = ['admin','office','director'].includes(currentProfile.role);

    let html = canEdit ? `<button class="submit-btn-outline" onclick="showCommitteeForm(${JSON.stringify(users).replace(/"/g,'&quot;')})">＋ 委員会を追加</button>` : '';
    if (committees.length === 0) html += '<div class="empty">委員会がまだありません</div>';

    committees.forEach(c => {
      const viceDirector = users.find(u => u.id === c.chair_id);
      const members = allMembers.filter(m => m.committee_id === c.id);
      const chair = members.find(m => m.role === 'chair');
      const viceChairs = members.filter(m => m.role === 'vice_chair');
      const chairUser = chair ? users.find(u => u.id === chair.user_id) : null;
      const viceChairUsers = viceChairs.map(v => users.find(u => u.id === v.user_id)).filter(Boolean);

      const roleRow = (label, color, person) => person ? `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray)">
          <span style="font-size:11px;font-weight:800;color:${color};width:90px;flex-shrink:0;letter-spacing:0.5px">${label}</span>
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--text)">${person.name}</div>
            <div style="font-size:12px;color:var(--text-mid)">${person.company}</div>
          </div>
        </div>` : '';

      html += `<div class="card card-accent">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div style="font-size:18px;font-weight:800;color:var(--gray-dark)">${c.name}</div>
          ${canEdit ? `<div style="display:flex;gap:6px">
            <button onclick="showMemberForm('${c.id}',${JSON.stringify(users).replace(/"/g,'&quot;')})" style="background:var(--red);color:#fff;border:none;border-radius:2px;padding:5px 10px;font-size:12px;cursor:pointer">メンバー</button>
            <button onclick="showCommitteeEdit('${c.id}',${JSON.stringify(users).replace(/"/g,'&quot;')})" style="background:none;border:1px solid var(--gray-mid);border-radius:2px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text-mid)">編集</button>
          </div>` : ''}
        </div>
        ${roleRow('担当副理事長', '#1a7a4a', viceDirector)}
        ${roleRow('委員長', 'var(--red)', chairUser)}
        ${viceChairUsers.map(u => roleRow('副委員長', '#1a2e4a', u)).join('')}
      </div>`;
    });

    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="empty">読み込みに失敗しました</div>'; }
}

function showCommitteeForm(users) {
  const el = document.getElementById('main-content');
  const userOptions = users.map(u => `<option value="${u.id}">${u.name}（${u.company}）</option>`).join('');
  el.innerHTML = `
    <button class="back-btn" onclick="navigate('committees')">← 一覧に戻る</button>
    <div class="card card-accent">
      <div class="section-title">🏛️ 委員会を追加</div>
      <div class="form-group-inline"><label>委員会名 *</label><input type="text" id="cm-name" placeholder="例：広報委員会"></div>
      <div class="form-group-inline"><label>説明</label><input type="text" id="cm-desc" placeholder="委員会の活動内容"></div>
      <div class="form-group-inline"><label>委員長（担当理事）</label>
        <select id="cm-chair"><option value="">未設定</option>${userOptions}</select>
      </div>
      <div class="form-group-inline"><label>表示順</label><input type="number" id="cm-order" placeholder="1" value="0"></div>
      <button class="submit-btn" onclick="submitCommittee()">追加する</button>
    </div>`;
}

async function submitCommittee() {
  const name = document.getElementById('cm-name').value;
  if (!name) { alert('委員会名は必須です'); return; }
  try {
    await axios.post(`${API}/committees`, {
      name,
      description: document.getElementById('cm-desc').value,
      chair_id: document.getElementById('cm-chair').value || null,
      sort_order: parseInt(document.getElementById('cm-order').value) || 0
    }, { headers: headers() });
    alert('追加しました！');
    navigate('committees');
  } catch(e) { alert('追加に失敗しました'); }
}

async function showCommitteeEdit(id, users) {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const res = await axios.get(`${API}/committees?id=eq.${id}`, { headers: headers() });
    const c = res.data[0];
    const userOptions = users.map(u => `<option value="${u.id}" ${u.id===c.chair_id?'selected':''}>${u.name}（${u.company}）</option>`).join('');
    el.innerHTML = `
      <button class="back-btn" onclick="navigate('committees')">← 一覧に戻る</button>
      <div class="card card-accent">
        <div class="section-title">🏛️ 委員会を編集</div>
        <div class="form-group-inline"><label>委員会名 *</label><input type="text" id="cm-name" value="${c.name}"></div>
        <div class="form-group-inline"><label>説明</label><input type="text" id="cm-desc" value="${c.description||''}"></div>
        <div class="form-group-inline"><label>委員長（担当理事）</label>
          <select id="cm-chair"><option value="">未設定</option>${userOptions}</select>
        </div>
        <div class="form-group-inline"><label>表示順</label><input type="number" id="cm-order" value="${c.sort_order||0}"></div>
        <button class="submit-btn" onclick="updateCommittee('${id}')">更新する</button>
        <button onclick="deleteCommittee('${id}')" style="width:100%;margin-top:10px;padding:12px;background:none;border:2px solid #ccc;border-radius:2px;font-size:14px;color:#999;cursor:pointer">この委員会を削除</button>
      </div>`;
  } catch(e) { alert('読み込みに失敗しました'); }
}

async function updateCommittee(id) {
  const name = document.getElementById('cm-name').value;
  if (!name) { alert('委員会名は必須です'); return; }
  try {
    await axios.patch(`${API}/committees?id=eq.${id}`, {
      name,
      description: document.getElementById('cm-desc').value,
      chair_id: document.getElementById('cm-chair').value || null,
      sort_order: parseInt(document.getElementById('cm-order').value) || 0
    }, { headers: { ...headers(), 'Prefer': 'return=minimal' } });
    alert('更新しました！');
    navigate('committees');
  } catch(e) { alert('更新に失敗しました'); }
}

async function deleteCommittee(id) {
  if (!confirm('この委員会を削除しますか？')) return;
  try {
    await axios.delete(`${API}/committees?id=eq.${id}`, { headers: headers() });
    alert('削除しました');
    navigate('committees');
  } catch(e) { alert('削除に失敗しました'); }
}

async function showMemberForm(committeeId, users) {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const [cRes, mRes] = await Promise.all([
      axios.get(`${API}/committees?id=eq.${committeeId}`, { headers: headers() }),
      axios.get(`${API}/committee_members?committee_id=eq.${committeeId}`, { headers: headers() })
    ]);
    const committee = cRes.data[0];
    const members = mRes.data;
    const memberIds = members.map(m => m.user_id);
    const nonMembers = users.filter(u => !memberIds.includes(u.id));

    let memberHtml = members.length === 0 ? '<div style="color:#aaa;font-size:14px;padding:10px 0">メンバーがいません</div>' :
      members.map(m => {
        const u = users.find(u => u.id === m.user_id);
        return u ? `<div class="row">
          <div><div class="row-title">${u.name}</div><div class="row-sub">${u.company}</div></div>
          <button onclick="removeMember('${m.id}','${committeeId}',${JSON.stringify(users).replace(/"/g,'&quot;')})" style="background:none;border:1px solid #ccc;border-radius:2px;padding:4px 10px;font-size:12px;cursor:pointer;color:#999">削除</button>
        </div>` : '';
      }).join('');

    const addOptions = nonMembers.map(u => `<option value="${u.id}">${u.name}（${u.company}）</option>`).join('');

    el.innerHTML = `
      <button class="back-btn" onclick="navigate('committees')">← 一覧に戻る</button>
      <div class="card card-accent">
        <div style="font-size:18px;font-weight:800;margin-bottom:16px">${committee.name} メンバー管理</div>
        <div class="section-title">現在のメンバー</div>
        ${memberHtml}
      </div>
      <div class="card">
        <div class="section-title">メンバーを追加</div>
        <div class="form-group-inline">
          <select id="add-member-select"><option value="">会員を選択...</option>${addOptions}</select>
        </div>
        <button class="submit-btn" onclick="addMember('${committeeId}',${JSON.stringify(users).replace(/"/g,'&quot;')})">追加する</button>
      </div>`;
  } catch(e) { alert('読み込みに失敗しました'); }
}

async function addMember(committeeId, users) {
  const userId = document.getElementById('add-member-select').value;
  if (!userId) { alert('会員を選択してください'); return; }
  try {
    await axios.post(`${API}/committee_members`, { committee_id: committeeId, user_id: userId }, { headers: headers() });
    showMemberForm(committeeId, users);
  } catch(e) { alert('追加に失敗しました'); }
}

async function removeMember(memberId, committeeId, users) {
  if (!confirm('このメンバーを削除しますか？')) return;
  try {
    await axios.delete(`${API}/committee_members?id=eq.${memberId}`, { headers: headers() });
    showMemberForm(committeeId, users);
  } catch(e) { alert('削除に失敗しました'); }
}
</script>
</body>
</html>
